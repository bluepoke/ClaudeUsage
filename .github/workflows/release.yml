name: Release

# Runs, as soon as a tag like vX.Y.Z is pushed, i.e.:
#   git tag v1.2.0
#   git push origin v1.2.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64]   # [win-x64, linux-x64, osx-x64]
        selfContained: [true, false]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: determine build variant
        id: variant
        run: |
          if [ "${{ matrix.selfContained }}" = "true" ]; then
            echo "SUFFIX=" >> "$GITHUB_OUTPUT"
            echo "DIR=${{ matrix.rid }}-self-contained" >> "$GITHUB_OUTPUT"
          else
            echo "SUFFIX=-framework-dependent" >> "$GITHUB_OUTPUT"
            echo "DIR=${{ matrix.rid }}-framework-dependent" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (single file)
        run: >
          dotnet publish ./ClaudeUsageTray/ClaudeUsageTray.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained ${{ matrix.selfContained }}
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish/${{ steps.variant.outputs.DIR }}

      - name: zip artifact
        run: |
          cp README.md publish/${{ steps.variant.outputs.DIR }}/README.md
          cd publish/${{ steps.variant.outputs.DIR }}
          zip -r ../../ClaudeUsageTray-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}.zip .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageTray-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}
          path: ClaudeUsageTray-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true