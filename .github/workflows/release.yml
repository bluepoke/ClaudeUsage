name: Release

# Runs, as soon as a tag like vX.Y.Z is pushed, i.e.:
#   git tag v1.2.0
#   git push origin v1.2.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64]   # [win-x64, linux-x64, osx-x64]
        selfContained: [true, false]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: determine build variant
        id: variant
        run: |
          if [ "${{ matrix.selfContained }}" = "true" ]; then
            echo "SUFFIX=" >> "$GITHUB_OUTPUT"
            echo "DIR=${{ matrix.rid }}-self-contained" >> "$GITHUB_OUTPUT"
          else
            echo "SUFFIX=-framework-dependent" >> "$GITHUB_OUTPUT"
            echo "DIR=${{ matrix.rid }}-framework-dependent" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (single file)
        run: >
          dotnet publish ./AIQuota/AIQuota.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained ${{ matrix.selfContained }}
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish/${{ steps.variant.outputs.DIR }}

      - name: zip artifact
        run: |
          cp README.md publish/${{ steps.variant.outputs.DIR }}/README.md
          cd publish/${{ steps.variant.outputs.DIR }}
          zip -r ../../AIQuota-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}.zip .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIQuota-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}
          path: AIQuota-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}${{ steps.variant.outputs.SUFFIX }}.zip

  build-msix:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $parts = $version.Split('.')
          $major = $parts[0]
          $minor = if ($parts.Length -gt 1) { $parts[1] } else { "0" }
          $build = if ($parts.Length -gt 2) { $parts[2] } else { "0" }
          # MSIX Identity Version needs exactly 4 numeric parts; Store requires the last one to be 0.
          $msixVersion = "$major.$minor.$build.0"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "MSIX_VERSION=$msixVersion" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish ./AIQuota/AIQuota.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./msix-staging

      - name: Stage manifest and assets
        shell: pwsh
        run: |
          Copy-Item AIQuota/Package/AppxManifest.xml ./msix-staging/AppxManifest.xml
          Copy-Item AIQuota/Package/Assets ./msix-staging/Assets -Recurse
          (Get-Content ./msix-staging/AppxManifest.xml -Raw) `
            -replace 'Version="1\.0\.0\.0"', "Version=`"${{ steps.version.outputs.MSIX_VERSION }}`"" |
            Set-Content ./msix-staging/AppxManifest.xml

      # windows-latest ships the Windows SDK via its bundled Visual Studio install, but the
      # exact SDK build number varies between runner image updates, so locate it dynamically
      # rather than hardcoding a version.
      - name: Locate makeappx.exe
        id: sdktools
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) {
            throw "makeappx.exe not found - Windows SDK missing on runner image."
          }
          echo "MAKEAPPX=$($makeappx.FullName)" >> $env:GITHUB_OUTPUT

      - name: Pack MSIX
        shell: pwsh
        run: |
          & "${{ steps.sdktools.outputs.MAKEAPPX }}" pack /d ./msix-staging /p ./AIQuota-${{ steps.version.outputs.VERSION }}-win-x64.msix /o

      # Unsigned on purpose: packages submitted through Partner Center for Store
      # certification are signed by the Store during ingestion, not locally.
      - name: upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIQuota-${{ steps.version.outputs.VERSION }}-win-x64-msix
          path: AIQuota-${{ steps.version.outputs.VERSION }}-win-x64.msix

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true