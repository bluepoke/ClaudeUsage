name: Release

# Runs, as soon as a tag like vX.Y.Z is pushed, i.e.:
#   git tag v1.2.0
#   git push origin v1.2.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64]   # [win-x64, linux-x64, osx-x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (self-contained, single file)
        run: >
          dotnet publish ./ClaudeUsageTray/ClaudeUsageTray.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish/${{ matrix.rid }}

      - name: zip artifact
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../ClaudeUsageTray-${{ matrix.rid }}.zip .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageTray-${{ matrix.rid }}
          path: ClaudeUsageTray-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true